services:
  proxy:
    build:
      context: .
      dockerfile: infrastructure/docker/proxy.Dockerfile
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:8080"
      - "443:443"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - edge
      - app_internal

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SUPPORT_EMAIL: ${VITE_SUPPORT_EMAIL:-support@example.com}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app_internal

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app_internal

  mongo:
    image: mongo:7
    command: ["mongod", "--bind_ip_all"]
    restart: unless-stopped
    volumes:
      - mongo_prod_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://localhost:27017 --eval \"quit(db.adminCommand('ping').ok ? 0 : 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - app_internal

volumes:
  mongo_prod_data:

networks:
  edge:
    driver: bridge
  app_internal:
    driver: bridge
    internal: true
