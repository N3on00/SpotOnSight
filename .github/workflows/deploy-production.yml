name: deploy-production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      VPS_USER: deploy
      SSHPASS: ${{ secrets.VPS_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -R "${{ secrets.VPS_HOST }}" || true
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Install rsync and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Deploy to VPS
        run: |
          rsync -az --delete --rsh="sshpass -e ssh" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env.production' \
            ./ "${VPS_USER}@${{ secrets.VPS_HOST }}:/opt/spotonsight/"

          sshpass -e ssh "${VPS_USER}@${{ secrets.VPS_HOST }}" '
            set -eu
            cd /opt/spotonsight
            chmod +x scripts/deploy-production.sh
            ./scripts/deploy-production.sh
            curl -fsS --retry 10 --retry-delay 3 --resolve spotonsight.com:443:127.0.0.1 https://spotonsight.com/api/health
          '
