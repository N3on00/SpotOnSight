name: CI

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        run: python -m pytest tests/backend -q

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test:run
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  docker-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare production env template
        run: cp .env.production.example .env.production

      - name: Validate production compose file
        run: docker compose -f docker-compose.prod.yml config

  required-checks:
    name: required-checks
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker-validate

    steps:
      - name: Confirm all CI checks passed
        run: echo "All required CI checks passed."
