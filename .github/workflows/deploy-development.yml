name: deploy-development

on:
  push:
    branches:
      - develop

concurrency:
  group: development-deploy
  cancel-in-progress: true

jobs:
  deploy-development:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -R "${{ secrets.VPS_HOST }}" || true
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Deploy dev stack to VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'mkdir -p /opt/spotonsight-dev'

          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env.production' \
            --exclude '.env.staging' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/spotonsight-dev/"

          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -eu
            cd /opt/spotonsight-dev
            chmod +x scripts/deploy-development.sh
            ./scripts/deploy-development.sh
            curl -fsS --retry 10 --retry-delay 3 --resolve dev.spotonsight.com:443:127.0.0.1 https://dev.spotonsight.com/api/health
          '
