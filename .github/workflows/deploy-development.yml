name: deploy-development

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: development-deploy
  cancel-in-progress: true

jobs:
  deploy-development:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}
    runs-on: ubuntu-latest
    environment:
      name: dev
    env:
      VPS_USER: deploy
      SSHPASS: ${{ secrets.VPS_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -R "${{ secrets.VPS_HOST }}" || true
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Install rsync and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Deploy dev stack to VPS
        run: |
          sshpass -e ssh "${VPS_USER}@${{ secrets.VPS_HOST }}" 'mkdir -p /opt/spotonsight-dev'

          rsync -az --delete --rsh="sshpass -e ssh" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env.production' \
            --exclude '.env.staging' \
            ./ "${VPS_USER}@${{ secrets.VPS_HOST }}:/opt/spotonsight-dev/"

          sshpass -e ssh "${VPS_USER}@${{ secrets.VPS_HOST }}" '
            set -eu
            cd /opt/spotonsight-dev
            chmod +x scripts/deploy-development.sh
            ./scripts/deploy-development.sh
            docker compose -p spotonsight-dev --env-file .env.staging -f docker-compose.staging.yml ps
          '
