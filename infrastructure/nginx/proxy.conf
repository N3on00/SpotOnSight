upstream frontend_upstream {
    server frontend:8080;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 8080;
    server_name spotonsight.com www.spotonsight.com _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name spotonsight.com www.spotonsight.com _;

    ssl_certificate /etc/letsencrypt/live/spotonsight.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spotonsight.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SpotOnSightSSL:10m;
    ssl_session_tickets off;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location = /api {
        return 301 /api/;
    }

    location / {
        proxy_pass http://frontend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
